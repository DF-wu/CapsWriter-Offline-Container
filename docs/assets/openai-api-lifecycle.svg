<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" data-drawio="">
<title>OpenAI-compatible transcription request lifecycle</title>
<desc>An OpenAI SDK request passes authentication and a declared-size check before any body is read, then bounded admission, multipart spooling, capped ffmpeg decoding, the shared ASR worker, response formatting, and unconditional cleanup. Rejected requests return 401, 413, or 429 without reading the body.</desc>
<defs>
<marker id="arrow-block" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10 Z" fill="currentColor"/>
</marker>
<marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="currentColor" stroke-width="1.5"/>
</marker>
<marker id="arrow-classic" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10 L 3 5 Z" fill="currentColor"/>
</marker>
<marker id="arrow-diamond" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
  <path d="M 0 6 L 6 0 L 12 6 L 6 12 Z" fill="currentColor"/>
</marker>
</defs>
<rect width="100%" height="100%" fill="#FFFFFF"/>
<rect x="40" y="96" width="200" height="80" rx="40" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="140" y="136" text-anchor="middle" dominant-baseline="central" font-family="Inter, Roboto, system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B"><tspan x="140" dy="-8.4">OpenAI SDK / HTTP client</tspan><tspan x="140" dy="16.8">OpenAI SDK／HTTP client</tspan></text>
<rect x="280" y="96" width="200" height="80" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="380" y="136" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="380" dy="-8.4">1  Auth + declared size</tspan><tspan x="380" dy="16.8">認證 + 宣告大小</tspan></text>
<polygon points="560,96 720,96 680,176 520,176" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="620" y="136" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="620" dy="-8.4">2  Bounded admission</tspan><tspan x="620" dy="16.8">有界 admission</tspan></text>
<path d="M 760 96 L 960 96 L 960 168 Q 910 184 860 168 Q 810 152 760 168 Z" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text x="860" y="136" text-anchor="middle" dominant-baseline="central" font-family="Inter, Roboto, system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B"><tspan x="860" dy="-8.4">3  One file + 12 fields</tspan><tspan x="860" dy="16.8">Spool closes on every path</tspan></text>
<rect x="1000" y="96" width="200" height="80" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="1100" y="136" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="1100" dy="-8.4">4  Capped ffmpeg decode</tspan><tspan x="1100" dy="16.8">限制 PCM 時長</tspan></text>
<rect x="1000" y="320" width="200" height="80" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="1100" y="360" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="1100" dy="-8.4">5  Shared ASR worker</tspan><tspan x="1100" dy="16.8">共用 ASR worker</tspan></text>
<rect x="760" y="320" width="200" height="80" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="860" y="360" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="860" dy="-8.4">6  OpenAI response format</tspan><tspan x="860" dy="16.8">OpenAI 回應格式</tspan></text>
<rect x="520" y="320" width="200" height="80" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
<text x="620" y="360" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#1E293B"><tspan x="620" dy="-8.4">7  Router + temp cleanup</tspan><tspan x="620" dy="16.8">Router + 暫存清理</tspan></text>
<rect x="280" y="320" width="200" height="80" rx="40" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="380" y="360" text-anchor="middle" dominant-baseline="central" font-family="Inter, Roboto, system-ui, -apple-system, sans-serif" font-size="12" fill="#1E293B"><tspan x="380" dy="-8.4">JSON / text / verbose</tspan><tspan x="380" dy="16.8">SRT / VTT</tspan></text>
<rect x="280" y="208" width="200" height="80" rx="40" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
<text x="380" y="248" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#7F1D1D"><tspan x="380" dy="-8.4">401 / 413</tspan><tspan x="380" dy="16.8">Body not read / 不讀取 body</tspan></text>
<rect x="520" y="208" width="200" height="80" rx="40" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="620" y="248" text-anchor="middle" dominant-baseline="central" font-family="Times New Roman,SimSun" font-size="12" fill="#78350F"><tspan x="620" dy="-8.4">429 + Retry-After</tspan><tspan x="620" dy="16.8">Body not read / 不讀取 body</tspan></text>
<text x="40" y="320" text-anchor="start" dominant-baseline="hanging" font-family="Times New Roman,SimSun" font-size="12" fill="#1E3A8A" font-weight="700"><tspan x="40" dy="0">Deadline: queue → cleanup</tspan><tspan x="40" dy="16.8">Deadline：排隊 → 清理</tspan></text>
<line x1="240" y1="136" x2="280" y2="136" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="480" y1="136" x2="520" y2="136" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="720" y1="136" x2="760" y2="136" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="960" y1="136" x2="1000" y2="136" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="1100" y1="176" x2="1100" y2="320" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="1000" y1="360" x2="960" y2="360" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="760" y1="360" x2="720" y2="360" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="520" y1="360" x2="480" y2="360" stroke="#1E293B" stroke-width="2" marker-end="url(#arrow-open)" style="color: #1E293B" fill="none"/>
<line x1="380" y1="176" x2="380" y2="208" stroke="#64748B" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#arrow-open)" style="color: #64748B" fill="none"/>
<line x1="620" y1="176" x2="620" y2="208" stroke="#64748B" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#arrow-open)" style="color: #64748B" fill="none"/>
</svg>
