<svg xmlns="http://www.w3.org/2000/svg" width="2336" height="448" viewBox="0 0 2336 448" data-drawio="">
<title>CapsWriter fork v1 and v2 maintenance tracks</title>
<desc>Released upstream changes flow through the fork v2 feature branch and cross-platform gates. V2 Git releases publish immutable sha-commit images and promote guarded latest images; critical fixes may be backported to maintenance/v1, whose image automation is not configured.</desc>
<defs>
<marker id="arrow-block" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10 Z" fill="currentColor"/>
</marker>
<marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="currentColor" stroke-width="1.5"/>
</marker>
<marker id="arrow-classic" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
  <path d="M 0 0 L 10 5 L 0 10 L 3 5 Z" fill="currentColor"/>
</marker>
<marker id="arrow-diamond" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
  <path d="M 0 6 L 6 0 L 12 6 L 6 12 Z" fill="currentColor"/>
</marker>
</defs>
<rect width="100%" height="100%" fill="#FFFFFF"/>
<rect x="52" y="275" width="208" height="80" rx="40" fill="#F5F5F5" stroke="#333333" stroke-width="2"/>
<text x="156" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="156" dy="-9.8">Upstream master</tspan><tspan x="156" dy="19.6">上游主線</tspan></text>
<rect x="368" y="64" width="400" height="80" rx="8" fill="#E5E5E5" stroke="#000000" stroke-width="2"/>
<text x="568" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="568" dy="-9.8">Merge released upstream changes</tspan><tspan x="568" dy="19.6">合併已發布的上游變更</tspan></text>
<rect x="924" y="54" width="296" height="100" rx="8" fill="#E5E5E5" stroke="#0A0A0A" stroke-width="2"/>
<text x="1072" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="1072" dy="-9.8">fork v2 feature branch</tspan><tspan x="1072" dy="19.6">跨平臺、TUI、OpenAI API</tspan></text>
<rect x="1332" y="52" width="416" height="104" rx="8" fill="#E5E5E5" stroke="#000000" stroke-width="2"/>
<text x="1540" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="1540" dy="-19.6">Linux containers + Windows CI</tspan><tspan x="1540" dy="19.6">Linux 容器 + Windows CI</tspan><tspan x="1540" dy="19.6">API / TUI / Web / security gates</tspan></text>
<rect x="1812" y="64" width="328" height="80" rx="40" fill="#F5F5F5" stroke="#333333" stroke-width="2"/>
<text x="1976" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="1976" dy="-19.6">fork-v2.x Git releases / 發布</tspan><tspan x="1976" dy="19.6">sha-commit + guarded latest</tspan><tspan x="1976" dy="19.6">images / 映像</tspan></text>
<polygon points="568,288 732,328 568,368 404,328" fill="#FFF3D4" stroke="#8B6914" stroke-width="2"/>
<text x="568" y="328" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="568" dy="-9.8">Critical or security fix?</tspan><tspan x="568" dy="19.6">是否為重大／安全修正？</tspan></text>
<path d="M 324 176 L 812 176 L 812 248 Q 690 264 568 248 Q 446 232 324 248 Z" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
<text x="568" y="216" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="568" dy="-9.8">Legacy v1 baseline / 舊版 v1 基線</tspan><tspan x="568" dy="19.6">upstream v2.5-alpha snapshot / 上游快照</tspan></text>
<rect x="876" y="261" width="392" height="100" rx="8" fill="#E5E5E5" stroke="#0A0A0A" stroke-width="2"/>
<text x="1072" y="311" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="1072" dy="-9.8">maintenance/v1</tspan><tspan x="1072" dy="19.6">人工小型 backport；禁止 merge v2</tspan></text>
<rect x="1356" y="261" width="368" height="100" rx="8" fill="#E5E5E5" stroke="#000000" stroke-width="2"/>
<text x="1540" y="311" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="1540" dy="-9.8">Legacy container + API smoke</tspan><tspan x="1540" dy="19.6">舊架構回歸與模型資產檢查</tspan></text>
<rect x="1812" y="271" width="440" height="80" rx="40" fill="#F5F5F5" stroke="#333333" stroke-width="2"/>
<text x="2032" y="311" text-anchor="middle" dominant-baseline="central" font-family="Arial,Microsoft JhengHei,Noto Sans CJK TC" font-size="14" fill="#000000"><tspan x="2032" dy="-19.6">fork-v1.x Git releases / 發布</tspan><tspan x="2032" dy="19.6">image automation not configured</tspan><tspan x="2032" dy="19.6">映像自動發布未設定</tspan></text>
<path d="M 260 302.23 L 270 301 L 270 104 L 368 104" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="768" y1="104" x2="924" y2="104" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="1220" y1="104" x2="1332" y2="104" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="1748" y1="104" x2="1812" y2="104" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="260" y1="315" x2="404" y2="315" stroke="#333333" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-open)" style="color: #333333" fill="none"/>
<line x1="732" y1="328" x2="876" y2="328" stroke="#333333" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-open)" style="color: #333333" fill="none"/>
<path d="M 812 216 L 822 216 L 822 295 L 876 298.46" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="1268" y1="311" x2="1356" y2="311" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
<line x1="1724" y1="311" x2="1812" y2="311" stroke="#000000" stroke-width="2.5" marker-end="url(#arrow-open)" style="color: #000000" fill="none"/>
</svg>
