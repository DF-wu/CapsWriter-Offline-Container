services:
  capswriter-server:
    image: ${CAPSWRITER_SERVER_IMAGE:-ghcr.io/df-wu/capswriter-offline-server:latest}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # all = request visible GPUs; 0 = CPU-only startup
              count: ${CAPSWRITER_GPU_DEVICE_COUNT:-all}
              capabilities: [gpu]
    environment:
      # qwen_asr (default) | fun_asr_nano
      CAPSWRITER_MODEL_TYPE: ${CAPSWRITER_MODEL_TYPE:-qwen_asr}

      # Official Qwen presets:
      # default  = recommended profile for this fork: ONNX GPU + llama CPU
      # cpu_only = pure CPU path
      CAPSWRITER_QWEN_PRESET: ${CAPSWRITER_QWEN_PRESET:-default}

      # auto = allow GPU profile when available, otherwise fall back to CPU
      # gpu  = request GPU-first startup, still fall back safely if unavailable
      # cpu  = force CPU-only runtime regardless of preset
      CAPSWRITER_INFERENCE_HARDWARE: ${CAPSWRITER_INFERENCE_HARDWARE:-auto}

      # true = remove downloaded archives after extraction
      CAPSWRITER_REMOVE_MODEL_ARCHIVES: ${CAPSWRITER_REMOVE_MODEL_ARCHIVES:-false}

      CAPSWRITER_SERVER_ADDR: 0.0.0.0
      CAPSWRITER_SERVER_PORT: ${CAPSWRITER_SERVER_PORT:-6016}

      CAPSWRITER_ENABLE_TRAY: "false"
      CAPSWRITER_LOG_LEVEL: ${CAPSWRITER_LOG_LEVEL:-INFO}
      CAPSWRITER_LOG_DIR: /app/logs

      # Shared thread hint for CPU-bound stages.
      CAPSWRITER_NUM_THREADS: ${CAPSWRITER_NUM_THREADS:-4}

      CAPSWRITER_FUNASR_DML_ENABLE: "false"
      CAPSWRITER_QWEN_USE_DML: "false"

      # Fun-ASR backend hint (kept as-is in this refactor).
      CAPSWRITER_FUNASR_VULKAN_ENABLE: ${CAPSWRITER_FUNASR_VULKAN_ENABLE:-true}

      # Advanced / internal Qwen backend overrides.
      # Leave blank to follow the preset-derived runtime profile.
      CAPSWRITER_QWEN_VULKAN_ENABLE: ${CAPSWRITER_QWEN_VULKAN_ENABLE:-}
      CAPSWRITER_QWEN_USE_CUDA: ${CAPSWRITER_QWEN_USE_CUDA:-}
      CAPSWRITER_QWEN_VULKAN_FORCE_FP32: ${CAPSWRITER_QWEN_VULKAN_FORCE_FP32:-}

      # Explicit Qwen tuning overrides. Leave blank to follow preset defaults.
      CAPSWRITER_QWEN_CHUNK_SIZE: ${CAPSWRITER_QWEN_CHUNK_SIZE:-}
      CAPSWRITER_QWEN_N_CTX: ${CAPSWRITER_QWEN_N_CTX:-}
      CAPSWRITER_QWEN_MEMORY_NUM: ${CAPSWRITER_QWEN_MEMORY_NUM:-}
      CAPSWRITER_QWEN_PAD_TO: ${CAPSWRITER_QWEN_PAD_TO:-}
      CAPSWRITER_QWEN_N_PREDICT: ${CAPSWRITER_QWEN_N_PREDICT:-}
      CAPSWRITER_QWEN_LLAMA_N_BATCH: ${CAPSWRITER_QWEN_LLAMA_N_BATCH:-}
      CAPSWRITER_QWEN_LLAMA_N_UBATCH: ${CAPSWRITER_QWEN_LLAMA_N_UBATCH:-}
      CAPSWRITER_QWEN_LLAMA_FLASH_ATTN: ${CAPSWRITER_QWEN_LLAMA_FLASH_ATTN:-}
      CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV: ${CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV:-}

      CAPSWRITER_INTERACTIVE_ERRORS: "false"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    ports:
      - "${CAPSWRITER_SERVER_PORT:-6016}:${CAPSWRITER_SERVER_PORT:-6016}"
    volumes:
      - ./models:/app/models
      - ./hot-server.txt:/app/hot-server.txt
      - capswriter-server-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "docker/server/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 20m
      retries: 5

volumes:
  capswriter-server-logs:
