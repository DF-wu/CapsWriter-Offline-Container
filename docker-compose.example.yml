services:
  capswriter-server:
    image: ${CAPSWRITER_SERVER_IMAGE:-capswriter-offline-v1-local:source}
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${CAPSWRITER_GPU_DEVICE_COUNT:-all}
              capabilities: [gpu]
    environment:
      CAPSWRITER_MODEL_TYPE: ${CAPSWRITER_MODEL_TYPE:-qwen_asr}
      CAPSWRITER_QWEN_PRESET: ${CAPSWRITER_QWEN_PRESET:-default}
      CAPSWRITER_INFERENCE_HARDWARE: ${CAPSWRITER_INFERENCE_HARDWARE:-auto}
      CAPSWRITER_REMOVE_MODEL_ARCHIVES: ${CAPSWRITER_REMOVE_MODEL_ARCHIVES:-false}

      CAPSWRITER_SERVER_ADDR: 0.0.0.0
      CAPSWRITER_SERVER_PORT: ${CAPSWRITER_SERVER_PORT:-6016}

      # Optional HTTP API. Docker forwarding requires a container-wide bind;
      # the published host port remains loopback-only by default.
      CAPSWRITER_HTTP_API_ENABLE: ${CAPSWRITER_HTTP_API_ENABLE:-false}
      CAPSWRITER_HTTP_API_BIND: ${CAPSWRITER_HTTP_API_BIND:-0.0.0.0}
      CAPSWRITER_HTTP_API_PORT: ${CAPSWRITER_HTTP_API_PORT:-6017}
      CAPSWRITER_HTTP_API_KEY: ${CAPSWRITER_HTTP_API_KEY:-}
      CAPSWRITER_HTTP_API_MAX_UPLOAD_MB: ${CAPSWRITER_HTTP_API_MAX_UPLOAD_MB:-100}
      CAPSWRITER_HTTP_API_TASK_TIMEOUT: ${CAPSWRITER_HTTP_API_TASK_TIMEOUT:-600}

      CAPSWRITER_ENABLE_TRAY: "false"
      CAPSWRITER_LOG_LEVEL: ${CAPSWRITER_LOG_LEVEL:-INFO}
      CAPSWRITER_LOG_DIR: /app/logs
      CAPSWRITER_NUM_THREADS: ${CAPSWRITER_NUM_THREADS:-4}

      CAPSWRITER_FUNASR_DML_ENABLE: "false"
      CAPSWRITER_FUNASR_VULKAN_ENABLE: ${CAPSWRITER_FUNASR_VULKAN_ENABLE:-true}
      CAPSWRITER_QWEN_USE_DML: "false"
      CAPSWRITER_QWEN_VULKAN_ENABLE: ${CAPSWRITER_QWEN_VULKAN_ENABLE:-true}

      CAPSWRITER_QWEN_LLAMA_N_BATCH: ${CAPSWRITER_QWEN_LLAMA_N_BATCH:-}
      CAPSWRITER_QWEN_LLAMA_N_UBATCH: ${CAPSWRITER_QWEN_LLAMA_N_UBATCH:-}
      CAPSWRITER_QWEN_LLAMA_FLASH_ATTN: ${CAPSWRITER_QWEN_LLAMA_FLASH_ATTN:-}
      CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV: ${CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV:-}

      CAPSWRITER_INTERACTIVE_ERRORS: "false"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    ports:
      - "${CAPSWRITER_SERVER_PORT:-6016}:${CAPSWRITER_SERVER_PORT:-6016}"
      - "${CAPSWRITER_HTTP_API_HOST_BIND:-127.0.0.1}:${CAPSWRITER_HTTP_API_PORT:-6017}:${CAPSWRITER_HTTP_API_PORT:-6017}"
    volumes:
      - ./models:/app/models
      - ./hot-server.txt:/app/hot-server.txt
      - capswriter-server-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "docker/server/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 20m
      retries: 5

volumes:
  capswriter-server-logs:
