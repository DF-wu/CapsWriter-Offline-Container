services:
  capswriter-server:
    image: ${CAPSWRITER_SERVER_IMAGE:-ghcr.io/df-wu/capswriter-offline-server:latest}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${CAPSWRITER_GPU_DEVICE_COUNT:-all}
              capabilities: [gpu]
    environment:
      CAPSWRITER_MODEL_TYPE: ${CAPSWRITER_MODEL_TYPE:-qwen_asr}
      CAPSWRITER_QWEN_PRESET: ${CAPSWRITER_QWEN_PRESET:-default}
      CAPSWRITER_INFERENCE_HARDWARE: ${CAPSWRITER_INFERENCE_HARDWARE:-auto}
      CAPSWRITER_REMOVE_MODEL_ARCHIVES: ${CAPSWRITER_REMOVE_MODEL_ARCHIVES:-false}

      CAPSWRITER_SERVER_ADDR: 0.0.0.0
      CAPSWRITER_SERVER_PORT: ${CAPSWRITER_SERVER_PORT:-6016}

      # Optional browser/API clients. Set CAPSWRITER_HTTP_API_ENABLE=true
      # and publish CAPSWRITER_HTTP_API_PORT when you want host access.
      CAPSWRITER_HTTP_API_ENABLE: ${CAPSWRITER_HTTP_API_ENABLE:-false}
      CAPSWRITER_HTTP_API_BIND: ${CAPSWRITER_HTTP_API_BIND:-0.0.0.0}
      CAPSWRITER_HTTP_API_PORT: ${CAPSWRITER_HTTP_API_PORT:-6017}
      CAPSWRITER_HTTP_API_KEY: ${CAPSWRITER_HTTP_API_KEY:-}
      CAPSWRITER_HTTP_API_KEY_FILE: ${CAPSWRITER_HTTP_API_KEY_FILE:-}
      CAPSWRITER_HTTP_API_ALLOW_INSECURE_BIND: ${CAPSWRITER_HTTP_API_ALLOW_INSECURE_BIND:-false}
      CAPSWRITER_HTTP_API_MAX_UPLOAD_MB: ${CAPSWRITER_HTTP_API_MAX_UPLOAD_MB:-100}
      CAPSWRITER_HTTP_API_TASK_TIMEOUT: ${CAPSWRITER_HTTP_API_TASK_TIMEOUT:-600}
      CAPSWRITER_HTTP_API_MAX_CONCURRENT_REQUESTS: ${CAPSWRITER_HTTP_API_MAX_CONCURRENT_REQUESTS:-2}
      CAPSWRITER_HTTP_API_CORS_ORIGINS: ${CAPSWRITER_HTTP_API_CORS_ORIGINS:-}
      CAPSWRITER_HTTP_API_LOG_TRANSCRIPTS: ${CAPSWRITER_HTTP_API_LOG_TRANSCRIPTS:-false}

      CAPSWRITER_ENABLE_TRAY: "false"
      CAPSWRITER_LOG_LEVEL: ${CAPSWRITER_LOG_LEVEL:-INFO}
      CAPSWRITER_LOG_DIR: /app/logs
      CAPSWRITER_NUM_THREADS: ${CAPSWRITER_NUM_THREADS:-4}
      CAPSWRITER_MODEL_DOWNLOAD_TIMEOUT: ${CAPSWRITER_MODEL_DOWNLOAD_TIMEOUT:-60}
      CAPSWRITER_GPU_BOOST_TIMEOUT: ${CAPSWRITER_GPU_BOOST_TIMEOUT:-5}

      CAPSWRITER_QWEN_CHUNK_SIZE: ${CAPSWRITER_QWEN_CHUNK_SIZE:-}
      CAPSWRITER_QWEN_N_CTX: ${CAPSWRITER_QWEN_N_CTX:-}
      CAPSWRITER_QWEN_MEMORY_NUM: ${CAPSWRITER_QWEN_MEMORY_NUM:-}
      CAPSWRITER_QWEN_PAD_TO: ${CAPSWRITER_QWEN_PAD_TO:-}
      CAPSWRITER_FUNASR_ENABLE_CTC: ${CAPSWRITER_FUNASR_ENABLE_CTC:-}
      CAPSWRITER_FUNASR_N_PREDICT: ${CAPSWRITER_FUNASR_N_PREDICT:-}
      CAPSWRITER_FUNASR_PAD_TO: ${CAPSWRITER_FUNASR_PAD_TO:-}
      CAPSWRITER_FUNASR_MAX_HOTWORDS: ${CAPSWRITER_FUNASR_MAX_HOTWORDS:-}
      CAPSWRITER_FUNASR_SIMILAR_THRESHOLD: ${CAPSWRITER_FUNASR_SIMILAR_THRESHOLD:-}

      CAPSWRITER_QWEN_LLAMA_N_BATCH: ${CAPSWRITER_QWEN_LLAMA_N_BATCH:-}
      CAPSWRITER_QWEN_LLAMA_N_UBATCH: ${CAPSWRITER_QWEN_LLAMA_N_UBATCH:-}
      CAPSWRITER_QWEN_LLAMA_FLASH_ATTN: ${CAPSWRITER_QWEN_LLAMA_FLASH_ATTN:-}
      CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV: ${CAPSWRITER_QWEN_LLAMA_OFFLOAD_KQV:-}

      CAPSWRITER_INTERACTIVE_ERRORS: "false"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    ports:
      - "${CAPSWRITER_SERVER_PORT:-6016}:${CAPSWRITER_SERVER_PORT:-6016}"
    volumes:
      - ./models:/app/models
      - ./hot-server.txt:/app/hot-server.txt
      - capswriter-server-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "docker/server/healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 20m
      retries: 5

volumes:
  capswriter-server-logs:
