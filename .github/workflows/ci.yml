name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Fetch upstream base
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/HaujetZhao/CapsWriter-Offline.git
          git fetch --no-tags --depth=1 upstream master:refs/remotes/upstream/master

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - name: Verify
        env:
          CAPSWRITER_UPSTREAM_BASE: upstream/master
        run: python scripts/verify_all.py

  api-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Create isolated API contract environment
        run: python -m venv "$RUNNER_TEMP/api-contract"

      - name: Install pinned API contract dependencies
        run: >-
          "$RUNNER_TEMP/api-contract/bin/python" -m pip install
          --disable-pip-version-check
          --require-hashes
          --only-binary=:all:
          --requirement requirements-api-test.lock

      - name: Verify API contract
        run: >-
          "$RUNNER_TEMP/api-contract/bin/python" scripts/verify_api_contract.py

  tui:
    name: ${{ matrix.os }} / TUI Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
        python-version: ["3.10", "3.12"]
        include:
          - os: ubuntu-24.04
            venv_python: ./.venv-tui/bin/python
          - os: windows-2022
            venv_python: ./.venv-tui/Scripts/python.exe
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create isolated TUI environment
        run: python -m venv .venv-tui

      - name: Install hash-locked TUI dependencies
        run: >-
          ${{ matrix.venv_python }} -m pip install
          --disable-pip-version-check
          --require-hashes
          --only-binary=:all:
          --requirement requirements-tui.lock

      - name: Verify TUI without skips
        run: ${{ matrix.venv_python }} scripts/verify_tui.py
